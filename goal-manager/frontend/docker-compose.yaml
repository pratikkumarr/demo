services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

      steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Deploy via SSH
          uses: appleboy/ssh-action@v0.1.3
          with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.SSH_KEY }}
            port: ${{ secrets.SSH_PORT }}
            script: |
              cd /path/to/your/app
              docker-compose pull
              docker-compose up -d